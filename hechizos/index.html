<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimorio de Personajes | HEX ROL</title>
    <link rel="stylesheet" href="../stylehechizos.css">
    <style>
        .oculto { display: none !important; }
        
        /* Estilos del Panel OP integrados rápidamente */
        .op-panel { background: rgba(20, 0, 40, 0.9); border: 1px solid var(--gold); padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto; text-align: center; }
        .op-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; text-align: left; }
        .op-form select, .op-form input { width: 100%; padding: 10px; background: #000; color: var(--gold); border: 1px dashed var(--gold); border-radius: 4px; box-sizing: border-box;}
        
        .queue-box { background: #000; border: 1px solid #444; padding: 15px; border-radius: 4px; max-height: 200px; overflow-y: auto; margin-bottom: 20px; text-align: left; font-family: monospace; color: #00ffff;}
        .btn-op { position: absolute; top: 20px; right: 20px; background: #1a0033; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-op:hover { background: var(--gold); color: #000; }
        
        /* Estilos Base del inventario */
        .top-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px dashed var(--gold); padding-bottom: 20px; }
        select.main-select { background: #111; color: var(--gold); border: 1px solid var(--gold); padding: 10px 20px; font-size: 1.1em; font-family: 'Cinzel', serif; border-radius: 4px; cursor: pointer; transition: 0.3s ease; }
        .grid-inventario { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1400px; margin: 0 auto; }
        .spell-card { background: rgba(21, 0, 41, 0.8); border: 1px solid var(--gold-dim); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; transition: 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.4); text-align: left; }
        .spell-card h3 { margin: 0 0 10px 0; color: #fff; border-bottom: 1px dashed #333; padding-bottom: 5px; font-size: 1.3em; font-family: 'Cinzel', serif; text-transform: uppercase;}
        .spell-tags { margin-bottom: 15px; }
        .spell-tag { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 5px; margin-bottom: 5px; background: #000; border: 1px solid #444; font-family: sans-serif; text-transform: uppercase;}
        .spell-desc { font-family: sans-serif; font-size: 0.9em; color: #ccc; line-height: 1.4; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 4px; border-left: 3px solid var(--gold); margin-bottom: 10px; }
        .spell-efecto { font-family: sans-serif; font-size: 0.85em; color: var(--red-alert); margin-bottom: 5px; font-weight: bold; }
        .spell-extra { font-family: sans-serif; font-size: 0.8em; color: #aaa; margin-bottom: 5px; }
        .tag-origen { font-family: sans-serif; color: #888; font-style: italic; margin-top: auto; font-size: 0.8em; text-align: right; padding-top: 10px; border-top: 1px dashed #333;}
        .loading { text-align: center; color: var(--gold); font-size: 1.2em; grid-column: 1 / -1; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <button onclick="window.abrirMenuOP()" class="btn-op">ACCESO OP</button>

    <div class="container-hex">
        <h1>Grimorio de Hechizos</h1>

        <div id="vista-catalogo">
            <div class="top-bar">
                <label style="color: #aaa; font-size: 1.1em; font-weight: bold;">Identidad:</label>
                <select id="selector-personaje" class="main-select" disabled>
                    <option value="">Obteniendo registros...</option>
                </select>
            </div>
            <div id="grid-inventario" class="grid-inventario">
                <div class="loading" id="loader">Extrayendo datos del servidor...</div>
            </div>
        </div>

        <div id="vista-op" class="oculto">
            <div class="op-panel">
                <h2>PANEL DE GESTIÓN (OP)</h2>
                <button type="button" onclick="window.mostrarCatalogo()" style="background:#333; margin-bottom:20px; color:white; border:none; padding:10px 20px;">⬅ Volver al Grimorio</button>
                
                <h3 style="color:#00ffff; border-bottom:1px solid #00ffff; padding-bottom:5px;">Añadir Hechizo a Personaje</h3>
                <div class="op-form">
                    <div><label>Personaje:</label><input type="text" id="op-personaje" placeholder="Ej. Linda"></div>
                    <div>
                        <label>Hechizo Existente:</label>
                        <select id="op-hechizo"><option value="">Cargando lista...</option></select>
                    </div>
                    <div>
                        <label>Tipo (Normal/Temporal):</label>
                        <select id="op-tipo"><option value="Normal">Normal</option><option value="Temporal">Temporal</option></select>
                    </div>
                    <div><label>Origen (Quién se lo enseñó):</label><input type="text" id="op-origen" placeholder="Ej. Mapa Hex, Yuko..."></div>
                </div>
                
                <button type="button" onclick="window.agregarACola()" style="background:#004a4a; color:#fff; border:1px solid #00ffff; padding:15px; width:100%; font-size:1.1em; font-weight:bold;">➕ AÑADIR A LA COLA DE CAMBIOS</button>

                <h3 style="margin-top:30px; color:var(--gold);">Filtro: Cambios Pendientes</h3>
                <div class="queue-box" id="cola-cambios">No hay cambios pendientes.</div>

                <button type="button" onclick="window.sincronizarBD()" id="btn-sync" style="background:#4a0000; color:#fff; border:1px solid #ff4444; padding:20px; width:100%; font-size:1.2em; font-weight:bold; cursor:not-allowed;" disabled>🔥 SINCRONIZAR CON BASE DE DATOS 🔥</button>
            </div>
        </div>

    </div>

    <script type="module" src="inventario-main.js"></script>
</body>
</html>
